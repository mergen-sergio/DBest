reference=Refers to an existing relation in the workspace.
scan=Reads tuples from a relation one at a time.
filter=Keeps the tuples that satisfy a predicate.
projection=Keeps only the named columns, dropping the rest.
selectColumns=Keeps a chosen subset of columns from the relation.
limit=Returns only the first N tuples.
duplicateRemoval=Removes duplicate tuples from the relation.
hashDuplicateRemoval=Removes duplicate tuples from the relation.
rename=Assigns a new name to a relation or to its columns.
explode=Expands a multivalued column into one tuple per value.
autoInc=Adds an auto-incrementing identifier column to each tuple.
group=Partitions tuples into groups by key.
hashGroup=Partitions tuples into groups by key.
aggregation=Applies aggregate functions, optionally per group.
sort=Reorders tuples by one or more columns.

and=Combines two boolean conditions with logical AND.
or=Combines two boolean conditions with logical OR.
xor=Combines two boolean conditions with logical XOR.
condition=Defines a boolean predicate used by other operators.
if=Chooses between two sources based on a condition.

join=Combines tuples that satisfy the join predicate.
mergeJoin=Combines tuples that satisfy the join predicate.
hashJoin=Combines tuples that satisfy the join predicate.

semiJoin=Keeps left-side tuples that have at least one match on the right.
mergeLeftSemiJoin=Keeps left-side tuples that have at least one match on the right.
hashLeftSemiJoin=Keeps left-side tuples that have at least one match on the right.
mergeRightSemiJoin=Keeps right-side tuples that have at least one match on the left.
hashRightSemiJoin=Keeps right-side tuples that have at least one match on the left.

antiJoin=Keeps left-side tuples that have no match on the right.
mergeLeftAntiJoin=Keeps left-side tuples that have no match on the right.
hashLeftAntiJoin=Keeps left-side tuples that have no match on the right.
mergeRightAntiJoin=Keeps right-side tuples that have no match on the left.
hashRightAntiJoin=Keeps right-side tuples that have no match on the left.

leftOuterJoin=Inner join preserving left-side tuples without a match.
mergeLeftOuterJoin=Inner join preserving left-side tuples without a match.
hashLeftOuterJoin=Inner join preserving left-side tuples without a match.
rightOuterJoin=Inner join preserving right-side tuples without a match.
mergeRightOuterJoin=Inner join preserving right-side tuples without a match.
hashRightOuterJoin=Inner join preserving right-side tuples without a match.
mergeFullOuterJoin=Inner join preserving unmatched tuples from both sides.
hashFullOuterJoin=Inner join preserving unmatched tuples from both sides.

cartesianProduct=Combines every tuple of A with every tuple of B.
hash=Precomputes hash values for a relation's columns.
memoize=Caches the result of a relation for reuse by later operators.
materialization=Eagerly evaluates and stores the relation in memory.

unilateralExistence=Flags tuples of one relation by whether a match exists in the other.
bilateralExistence=Flags tuples of both relations by whether a match exists in the other.

append=Concatenates tuples from two relations without removing duplicates.
union=Combines tuples from two compatible relations, removing duplicates.
hashUnion=Combines tuples from two compatible relations, removing duplicates.
intersection=Keeps tuples that appear in both relations.
hashIntersection=Keeps tuples that appear in both relations.
difference=Tuples from the first relation that are not in the second.
hashDifference=Tuples from the first relation that are not in the second.
