reference=Refere-se a uma relação existente no workspace.
scan=Lê as tuplas de uma relação uma a uma.
filter=Retém as tuplas que satisfazem um predicado.
projection=Mantém apenas as colunas indicadas, descartando o resto.
selectColumns=Mantém um subconjunto escolhido de colunas da relação.
limit=Retorna apenas as N primeiras tuplas.
duplicateRemoval=Remove tuplas duplicadas da relação.
hashDuplicateRemoval=Remove tuplas duplicadas da relação.
rename=Atribui um novo nome a uma relação ou às suas colunas.
explode=Expande uma coluna multivalorada em uma tupla por valor.
autoInc=Adiciona uma coluna de identificador auto-incrementável a cada tupla.
group=Particiona tuplas em grupos por chave.
hashGroup=Particiona tuplas em grupos por chave.
aggregation=Aplica funções de agregação, opcionalmente por grupos.
sort=Reordena tuplas por uma ou mais colunas.

and=Combina duas condições booleanas com E lógico.
or=Combina duas condições booleanas com OU lógico.
xor=Combina duas condições booleanas com XOR lógico.
condition=Define um predicado booleano usado por outros operadores.
if=Escolhe entre duas origens com base em uma condição.

join=Combina tuplas que satisfazem o predicado de junção.
mergeJoin=Combina tuplas que satisfazem o predicado de junção.
hashJoin=Combina tuplas que satisfazem o predicado de junção.

semiJoin=Mantém as tuplas da esquerda que têm ao menos um casamento à direita.
mergeLeftSemiJoin=Mantém as tuplas da esquerda que têm ao menos um casamento à direita.
hashLeftSemiJoin=Mantém as tuplas da esquerda que têm ao menos um casamento à direita.
mergeRightSemiJoin=Mantém as tuplas da direita que têm ao menos um casamento à esquerda.
hashRightSemiJoin=Mantém as tuplas da direita que têm ao menos um casamento à esquerda.

antiJoin=Mantém as tuplas da esquerda que não têm casamento à direita.
mergeLeftAntiJoin=Mantém as tuplas da esquerda que não têm casamento à direita.
hashLeftAntiJoin=Mantém as tuplas da esquerda que não têm casamento à direita.
mergeRightAntiJoin=Mantém as tuplas da direita que não têm casamento à esquerda.
hashRightAntiJoin=Mantém as tuplas da direita que não têm casamento à esquerda.

leftOuterJoin=Inner join preservando as tuplas da esquerda sem par.
mergeLeftOuterJoin=Inner join preservando as tuplas da esquerda sem par.
hashLeftOuterJoin=Inner join preservando as tuplas da esquerda sem par.
rightOuterJoin=Inner join preservando as tuplas da direita sem par.
mergeRightOuterJoin=Inner join preservando as tuplas da direita sem par.
hashRightOuterJoin=Inner join preservando as tuplas da direita sem par.
mergeFullOuterJoin=Inner join preservando as tuplas sem par de ambos os lados.
hashFullOuterJoin=Inner join preservando as tuplas sem par de ambos os lados.

cartesianProduct=Combina cada tupla de A com cada tupla de B.
hash=Pré-computa valores de hash para as colunas de uma relação.
memoize=Armazena em cache o resultado de uma relação para reuso por operadores posteriores.
materialization=Avalia e armazena a relação em memória de forma antecipada.

unilateralExistence=Sinaliza as tuplas de uma relação conforme exista ou não casamento na outra.
bilateralExistence=Sinaliza as tuplas de ambas as relações conforme exista ou não casamento na outra.

append=Concatena tuplas de duas relações sem remover duplicatas.
union=Une tuplas de duas relações compatíveis, removendo duplicatas.
hashUnion=Une tuplas de duas relações compatíveis, removendo duplicatas.
intersection=Mantém tuplas que aparecem nas duas relações.
hashIntersection=Mantém tuplas que aparecem nas duas relações.
difference=Tuplas da primeira relação que não estão na segunda.
hashDifference=Tuplas da primeira relação que não estão na segunda.
